# fly.io 설정 - 도쿄(nrt) 리전
# app 이름은 `fly launch` 시 고유한 이름으로 다시 지정해도 됩니다.
app = "saenggibu-doumi"
primary_region = "nrt"

[build]

[env]
  DEBUG = "false"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  # 0이면 트래픽이 없을 때 머신이 완전히 꺼져, 다음 접속자가 콜드 스타트를
  # 감수해야 한다(첫 로딩이 느려짐). 1로 두면 항상 1대는 켜져 있어 콜드
  # 스타트가 사라지는 대신 Fly.io 비용이 계속 발생한다.
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
